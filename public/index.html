<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AdMonitor — competitor ad radar</title>
<style>
  :root{--bg:#0b0d12;--panel:#151922;--panel2:#1c2230;--line:#262d3d;--ink:#e7ecf3;--mut:#8a94a6;--acc:#6ea8ff;--win:#34d399;--scale:#fbbf24;--kill:#f87171;--new:#a78bfa}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto}
  header{padding:20px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
  header h1{font-size:18px;margin:0;font-weight:650}
  header .dot{width:9px;height:9px;border-radius:50%;background:var(--win);box-shadow:0 0 10px var(--win)}
  .mut{color:var(--mut)}
  main{padding:24px 28px;max-width:1200px;margin:auto}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .stat .n{font-size:26px;font-weight:700}
  .stat .l{color:var(--mut);font-size:12px;margin-top:2px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .chip{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:7px 13px;border-radius:999px;cursor:pointer;font-size:13px}
  .chip.on{background:var(--acc);border-color:var(--acc);color:#06101f;font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .ad{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .ad img{width:100%;height:200px;object-fit:cover;background:#222}
  .ad .b{padding:12px;display:flex;flex-direction:column;gap:8px;flex:1}
  .ad .body{font-size:13px;color:#cdd5e1;max-height:84px;overflow:hidden}
  .tags{display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600}
  .t-winner{background:rgba(52,211,153,.15);color:var(--win)}
  .t-scaling{background:rgba(251,191,36,.15);color:var(--scale)}
  .t-new{background:rgba(167,139,250,.16);color:var(--new)}
  .t-killed_fast{background:rgba(248,113,113,.15);color:var(--kill)}
  .t-running,.t-retired{background:#222a39;color:var(--mut)}
  .ad .meta{font-size:12px;color:var(--mut);display:flex;justify-content:space-between;margin-top:auto}
  .ad a{color:var(--acc);text-decoration:none;font-size:12px}
  .legend{font-size:12px;color:var(--mut);margin:0 0 18px}
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>AdMonitor</h1>
  <span class="mut" id="sub">loading…</span>
</header>
<main>
  <div class="cards" id="stats"></div>
  <p class="legend">🏆 <b>Winner</b> = active 30+ days · 🔥 <b>Scaling</b> = 3+ live variants · 🆕 <b>New</b> = first seen ≤7d · 💀 <b>Killed fast</b> = ran &lt;7d then stopped. (Inferred from longevity/variants — Meta doesn't publish spend for commercial ads.)</p>
  <div class="row" id="filters"></div>
  <div class="grid" id="grid"></div>
</main>
<script>
const FILTERS = [
  ['all','All'],['winner','🏆 Winners'],['scaling','🔥 Scaling'],
  ['new','🆕 New (7d)'],['killed_fast','💀 Killed fast'],['active','Active'],['inactive','Inactive']
];
let ADS = [], active = 'all';

function isNew(a){ return Date.now() - a.first_seen < 7*86400000; }

function matches(a){
  if (active==='all') return true;
  if (active==='active') return a.status==='active';
  if (active==='inactive') return a.status==='inactive';
  if (active==='new') return isNew(a);
  return a.bucket===active;
}

function tagFor(a){
  const tags=[];
  if (isNew(a)) tags.push(['new','🆕 New']);
  if (a.bucket==='winner') tags.push(['winner','🏆 '+a.daysActive+'d']);
  if (a.bucket==='scaling') tags.push(['scaling','🔥 '+a.variants+' variants']);
  if (a.bucket==='killed_fast') tags.push(['killed_fast','💀 '+a.daysActive+'d']);
  if (!tags.length) tags.push([a.bucket, a.status==='active'? a.daysActive+'d live':'retired']);
  return tags;
}

function render(){
  const grid = document.getElementById('grid');
  const list = ADS.filter(matches);
  grid.innerHTML = list.map(a=>`
    <div class="ad">
      ${(a.creative_path||a.image_url)?`<img loading="lazy" src="${a.creative_path||a.image_url}" ${a.image_url?`onerror="this.onerror=null;this.src='${a.image_url}'"`:''}>${a.media_type==='video'?'<span class="tag t-running" style="position:absolute;margin:8px">▶ video</span>':''}`:''}
      <div class="b">
        <div class="tags">${tagFor(a).map(([k,l])=>`<span class="tag t-${k}">${l}</span>`).join('')}</div>
        <div class="body">${(a.body||'').replace(/</g,'&lt;').slice(0,200)||'<span class=mut>(no text)</span>'}</div>
        <div class="meta">
          <span>${a.competitor} · ${a.started_on||''}</span>
          <a href="https://www.facebook.com/ads/library/?id=${a.library_id}" target="_blank">Meta →</a>
        </div>
      </div>
    </div>`).join('') || '<p class="mut">No ads in this view yet. Run <code>npm run poll</code>.</p>';
}

async function load(){
  const [ads, ins] = await Promise.all([
    fetch('/api/ads').then(r=>r.json()),
    fetch('/api/insights').then(r=>r.json())
  ]);
  ADS = ads;
  const t = ins.totals;
  document.getElementById('sub').textContent =
    `tracking ${t.tracked} ads across ${ins.byCompetitor.length} competitor(s)`;
  document.getElementById('stats').innerHTML = [
    ['Active ads',t.active],['🏆 Likely winners',t.winners],['🔥 Scaling',t.scaling],
    ['🆕 New this week',t.newThisWeek],['💀 Killed fast',t.killedFast]
  ].map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
  document.getElementById('filters').innerHTML = FILTERS.map(([k,l])=>
    `<span class="chip ${k===active?'on':''}" data-k="${k}">${l}</span>`).join('');
  document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{active=c.dataset.k;
    document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===c));render();});
  render();
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
